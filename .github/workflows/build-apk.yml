name: Compilar APK de Android

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma Android 36
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" >/dev/null

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar web
        run: npm run build

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Compilar APK (debug)
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Renombrar APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk LevelUp.apk

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: LevelUp-APK
          path: LevelUp.apk

      - name: Publicar APK en Release descargable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create apk-latest LevelUp.apk \
            --title "Level Up — APK (última versión)" \
            --notes "Descarga **LevelUp.apk** en tu Android e instálala. Si te avisa de 'origen desconocido', permite la instalación (es tu propia app)."
