name: Compilar APK de Android

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceptar licencias e instalar plataformas
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "platforms;android-35" "build-tools;34.0.0" "build-tools;35.0.0" >/dev/null

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar web (Vite)
        run: npm run build

      - name: Generar proyecto Android (Capacitor)
        run: npx cap add android

      - name: Generar iconos y splash
        run: npx @capacitor/assets generate --android

      - name: Sincronizar web → Android
        run: npx cap sync android

      - name: Compilar APK (debug)
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Renombrar APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk LevelUp.apk

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: LevelUp-APK
          path: LevelUp.apk
          if-no-files-found: error

      - name: Publicar APK en Release descargable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create apk-latest LevelUp.apk \
            --title "Level Up — APK (última versión)" \
            --notes "Descarga **LevelUp.apk** en tu Android e instálala. Si Android avisa de 'origen desconocido', permite la instalación (es tu propia app)."
